name: test

on:
  push:
    branches:
      - test

env:
  IS_CI: true

permissions:
  contents: write

jobs:
  test:
    name: test1
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 测试
        uses: ./
        with:
          files: |
            ./test-folder/一搜.app
            ./test-folder/1.txt
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
